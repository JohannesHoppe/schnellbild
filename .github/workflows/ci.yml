name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & package
    runs-on: macos-15          # GitHub-hosted macOS runner — ships Xcode preinstalled
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build app bundle (release)   # runs `swift build -c release` internally
        run: ./Scripts/build_app.sh

      - name: Zip app
        run: ditto -c -k --keepParent build/Schnellbild.app build/Schnellbild.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Schnellbild-app
          path: build/Schnellbild.app.zip
          if-no-files-found: error

  ui-tests:
    name: UI tests (XCUITest)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run XCUITests
        run: |
          xcodebuild test \
            -project Schnellbild.xcodeproj \
            -scheme Schnellbild \
            -destination 'platform=macOS' \
            -only-testing:SchnellbildUITests \
            -derivedDataPath build/DerivedData
